services:
  steam-dashboard-api:
    image: steam-dashboard-api
    build: .
    container_name: steam-api
    ports:
      - 8000:8000
    volumes:
      - ./data/:/usr/src/app/data
    env_file: .env
    # command: "uvicorn run:app --host 0.0.0.0"
  # cache:
  #   image: redis:7.4-alpine
  #   container_name: redis
  #   ports:
  #     - 6379:6379
  db:
    image: postgres:16
    ports: 
      - 5432:5432
    environment:
      - POSTGRES_PASSWORD=postgres
volumes:
  steam-api-data:
