{{define "apps"}}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steam Library</title>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<style>
  :root {
    color-scheme: dark;
    --bg: #0f1115;
    --card: #171a21;
    --border: #2a2e37;
    --text: #e6e9ef;
    --muted: #8a90a0;
    --accent: #66c0f4;
    --row-hover: #1f2430;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 2.5rem 1.5rem;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .page { max-width: 1000px; margin: 0 auto; }
  .page-header { margin-bottom: 1.5rem; }
  .page-header h1 { margin: 0 0 0.25rem; font-size: 1.75rem; }
  .subtitle { margin: 0; color: var(--muted); }
  .filters {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  .filters input[type="search"] {
    flex: 1 1 220px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.5rem 0.85rem;
    border-radius: 8px;
    font-size: 0.9rem;
  }
  .filters input[type="search"]:focus {
    outline: none;
    border-color: var(--accent);
  }
  .filter-chip {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.45rem 0.85rem;
    border-radius: 999px;
    font-size: 0.85rem;
    cursor: pointer;
    user-select: none;
  }
  .filter-chip:has(input:checked) {
    color: var(--accent);
    border-color: var(--accent);
  }
  .filter-chip input { accent-color: var(--accent); }
  .table-meta {
    padding: 0.6rem 1rem;
    color: var(--muted);
    font-size: 0.8rem;
    border-bottom: 1px solid var(--border);
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  }
  table.apps-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
  }
  thead th {
    position: sticky;
    top: 0;
    background: #1c2029;
    text-align: left;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .icon-col { width: 44px; }
  tbody td {
    padding: 0.6rem 1rem;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tbody tr:hover { background: var(--row-hover); }
  tbody tr:last-child td { border-bottom: none; }
  .app-icon { width: 24px; height: 24px; border-radius: 4px; display: block; }
  .name-col { color: var(--text); font-weight: 500; }
  .num-col { color: var(--muted); font-variant-numeric: tabular-nums; }
  .check-col { width: 90px; text-align: center; }
  .check-col input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  .empty-row { text-align: center; color: var(--muted); padding: 2rem 1rem; }
  a.sort-link {
    color: var(--muted);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    cursor: pointer;
  }
  a.sort-link:hover { color: var(--text); }
  a.sort-link.sort-active { color: var(--accent); font-weight: 600; }
  .arrow { font-size: 0.7rem; }
  .htmx-request#apps-table { opacity: 0.5; transition: opacity 0.15s ease-in-out; }
</style>
</head>
<body>
  <div class="page">
    <header class="page-header">
      <h1>Steam Library</h1>
      <p class="subtitle">Browse, sort and tag your library</p>
    </header>
    <form id="filters" class="filters"
          hx-get="/apps"
          hx-include="#apps-table"
          hx-target="#apps-table"
          hx-swap="innerHTML"
          hx-trigger="input changed delay:400ms, change, submit">
      <input type="search" name="q" placeholder="Search games…" value="{{.Query}}">
      <label class="filter-chip">
        <input type="checkbox" name="queue_only" value="1" {{if .QueueOnly}}checked{{end}}>
        Queue
      </label>
      <label class="filter-chip">
        <input type="checkbox" name="now_playing_only" value="1" {{if .NowPlayingOnly}}checked{{end}}>
        Now Playing
      </label>
      <label class="filter-chip">
        <input type="checkbox" name="favourite_only" value="1" {{if .FavouriteOnly}}checked{{end}}>
        Favourites
      </label>
    </form>
    <div id="apps-table" class="card">
      {{template "apps_table" .}}
    </div>
  </div>
</body>
</html>
{{end}}
